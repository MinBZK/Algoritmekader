name: Deploy PR preview
on:
  pull_request:
    types:
      - opened
      - reopened
      - synchronize
      - closed

concurrency: preview-${{ github.ref }}

jobs:
  deploy:
    name: deploy PR
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: get tag
        id: get_commit_hash
        run: |
          echo "commit_hash=$(git describe --tags)" >> "$GITHUB_OUTPUT"

      - name: inject version
        run: |
          sed -i 's/development/${{ steps.get_commit_hash.outputs.commit_hash }}/g' docs/version.md

      - name: Add url
        run: |
          echo "site_url: https://minbzk.github.io/Algoritmekader/pr-preview/pr-${{github.event.number}}" >> mkdocs.yml

      - uses: actions/setup-python@v6
        if: github.event.action != 'closed'
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: install dependencies
        if: github.event.action != 'closed'
        run: |
          git config --global url."https://github-actions:${{ secrets.MATERIAL_INSIDERS_TOKEN }}@github".insteadOf ssh://git@github
          pip install -r requirements-prod.txt
          
      - name: Log package versions
        if: github.event.action != 'closed'
        run: |
          echo "=== Installed package versions ==="
          pip show mkdocs-material
          pip list | grep mkdocs
          echo "=== Git info for Material fork ==="
          cd $(python -c "import mkdocs_material; print(mkdocs_material.__path__[0])")/../ 
          if [ -d ".git" ]; then git log --oneline -5; fi

      - name: build preview
        if: github.event.action != 'closed'
        run: |
          mkdocs build
          echo "<!-- mkdocs-material version: $(pip show mkdocs-material | grep Version) -->" >> ./site/index.html

      - uses: actions/upload-artifact@v5
        if: github.event.action != 'closed'
        with:
          name: AlgoritmeKaderWebsite-${{github.event.number}}
          path: ./site/

      - name: Deploy preview
        if: github.event.pull_request.head.repo.full_name == github.repository && github.actor != 'dependabot[bot]'
        uses: rossjrw/pr-preview-action@v1
        with:
          source-dir: ./site/
