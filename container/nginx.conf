worker_processes 1;

error_log /dev/stderr warn;
pid /tmp/nginx.pid;

events {
    # Max simultaneous connections per worker. Cheap (~256B each), so keep the
    # nginx default for headroom under traffic spikes / idle keepalive clients.
    worker_connections 1024;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;
    sendfile on;
    keepalive_timeout 65;
    server_tokens off;
    access_log off;

    # Writable temp paths (read-only root filesystem; only /tmp is writable).
    client_body_temp_path /tmp/client_temp;
    proxy_temp_path /tmp/proxy_temp;
    fastcgi_temp_path /tmp/fastcgi_temp;
    uwsgi_temp_path /tmp/uwsgi_temp;
    scgi_temp_path /tmp/scgi_temp;

    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml text/javascript image/svg+xml;
    gzip_vary on;
    gzip_min_length 256;

    # The server block is rendered from a template at startup (envsubst -> tmpfs,
    # read-only-rootfs friendly) so the runtime origin/base path can be injected.
    # See container/default.conf.template and NGINX_ENVSUBST_OUTPUT_DIR.
    include /tmp/*.conf;
}
