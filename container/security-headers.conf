# Shared security headers, included at both server and asset-location scope.
#
# nginx's add_header is NOT cumulative: a location that sets any add_header drops
# ALL inherited ones. Including this snippet everywhere keeps the full set on
# every response (including cached static assets). This overrides the baseline
# security-headers.conf shipped by the nginx-base image with the stricter,
# Algoritmekader-specific Content-Security-Policy.

add_header X-Content-Type-Options "nosniff" always;
add_header X-Frame-Options "SAMEORIGIN" always;
add_header Referrer-Policy "strict-origin-when-cross-origin" always;
add_header Strict-Transport-Security "max-age=31536000" always;
add_header Permissions-Policy "geolocation=(), microphone=(), camera=(), payment=(), usb=()" always;
add_header Cross-Origin-Opener-Policy "same-origin" always;
add_header Cross-Origin-Resource-Policy "same-origin" always;
add_header X-Permitted-Cross-Domain-Policies "none" always;

# script-src allows the Excel-export libs (cdnjs) and the AI-verordening
# beslishulp bundle (served from GitHub release assets). object-src/base-uri/
# frame-ancestors harden against plugin, <base> and clickjacking injection.
add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline' https://cdnjs.cloudflare.com https://github.com https://release-assets.githubusercontent.com; style-src 'self' 'unsafe-inline'; img-src 'self' data:; font-src 'self' data:; object-src 'none'; base-uri 'self'; frame-ancestors 'self'" always;
